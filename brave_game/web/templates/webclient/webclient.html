{% extends "webclient/base.html" %}
{% load static %}
{% block client %}
<div id="toolbar"></div>

<div id="main" class="split split-vertical" data-role-default>
  <div id="main-sub" class="split-sub">
    <div id="messagewindow"></div>
    <div id="mobile-nav-dock" aria-hidden="true"></div>
    <div id="mobile-utility-sheet" aria-hidden="true"></div>
    <div id="brave-picker-sheet" aria-hidden="true"></div>
    <div id="brave-objectives-sheet" aria-hidden="true"></div>
    <div id="brave-notice-stack" aria-hidden="true"></div>
    <div id="brave-room-voice-overlay-desktop" aria-hidden="true"></div>
    <div id="brave-room-voice-overlay-self" aria-hidden="true"></div>
    <div id="brave-room-voice-overlay-mobile" aria-hidden="true"></div>
    <div id="brave-chat-overlay-backdrop" aria-hidden="true"></div>
    <div id="brave-intro-veil" class="brave-intro-veil--active"></div>
    <div id="scene-rail" class="scene-rail" aria-hidden="true">
      <section id="scene-pack-panel" class="scene-rail__panel scene-rail__panel--pack scene-rail__panel--hidden scene-rail__panel--clickable brave-click" aria-label="Pack" data-brave-command="pack" title="pack" role="button" tabindex="0"></section>
      <section id="scene-vicinity-panel" class="scene-rail__panel scene-rail__panel--vicinity scene-rail__panel--hidden" aria-label="The Vicinity"></section>
      <div id="scene-card" class="scene-card"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rpg-awesome@0.2.0/css/rpg-awesome.min.css"><link rel="stylesheet" href="{% static 'webclient/css/brave_webclient.css' %}?v=20260430x">
<script>
(function () {
  var clearIntroVeil = function () {
    var veil = document.getElementById("brave-intro-veil");
    if (veil) {
      veil.classList.remove("brave-intro-veil--active");
    }
  };
  var watchdog = window.setInterval(function () {
    var body = document.body;
    var sheet = document.getElementById("brave-objectives-sheet");
    var hasVisibleWelcome = !!(sheet && sheet.getAttribute("aria-hidden") === "false");
    var scene = body ? body.getAttribute("data-brave-scene") : "";
    var view = body ? body.getAttribute("data-brave-view") : "";
    if (hasVisibleWelcome || scene === "explore" || view === "room") {
      clearIntroVeil();
      window.clearInterval(watchdog);
    }
  }, 250);
  window.setTimeout(function () {
    clearIntroVeil();
    window.clearInterval(watchdog);
  }, 8000);
})();
</script>
<script src="{% static 'webclient/js/brave_bootstrap.js' %}?v=20260430x"></script>
{% endblock %}
